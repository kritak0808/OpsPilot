apiVersion: v2
name: opspilot
description: Enterprise Helm Chart deployment for OpsPilot AI Operations Platform
type: application
version: 1.0.0
appVersion: "1.0.0"
dependencies:
  - name: postgresql
    version: 12.1.0
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 17.13.0
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
